version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       quoterdb
      POSTGRES_USER:     quoter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quoter -d quoterdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  app:
    build: .
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL:             jdbc:postgresql://postgres:5432/quoterdb
      SPRING_DATASOURCE_USERNAME:        quoter
      SPRING_DATASOURCE_PASSWORD:        ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS:    kafka:9092
      JWT_SECRET:                        ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS:              ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
