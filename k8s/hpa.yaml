apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quoter-hpa
  namespace: quoter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jpm-quoter
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
