# kube-prometheus-stack values for k3s + jpm-quoter
# helm upgrade --install kube-prom prometheus-community/kube-prometheus-stack \
#   -n monitoring --create-namespace -f monitoring/prometheus-values.yaml

nameOverride: "kube-prom"

prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: "4GB"
    scrapeInterval: 15s
    evaluationInterval: 15s
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    additionalScrapeConfigs:
      - job_name: jpm-quoter
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [quoter]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

grafana:
  enabled: true
  adminPassword: "sentinel-admin"
  grafana.ini:
    server:
      root_url: "http://grafana.local"
    security:
      allow_embedding: true
    auth.anonymous:
      enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# Reduce noise in k3s — these components don't exist
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
