# API versioning note
# All endpoints are accessible at both /quotes and /api/v1/quotes
# via the AntPathRequestMatcher aliases configured in SecurityConfig.
# The /api/v1 prefix is documented in Swagger via springdoc.api-docs.path
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/api/v1/swagger-ui.html
