spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:quotertest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:test-only-secret-32-chars-minimum-ok}

cors:
  allowed-origins: http://localhost:5173

logging:
  level:
    root: WARN
    com.manoj.quoter: INFO
